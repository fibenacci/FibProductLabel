name: CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  quality:
    name: PHP Quality | SW ${{ matrix.shopware }}, PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shopware: '6.7.2.2'
            php: '8.3'
#          - shopware: '6.6.10.15'
#            php: '8.2'
    steps:
      - name: Clone Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Docker
        run: docker pull dockware/shopware:${{ matrix.shopware }}

      - name: Start Docker
        run: |
          # Use unique container name to avoid conflicts in parallel runs
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker run --rm --name $CONTAINER_NAME --env PHP_VERSION=${{ matrix.php }} -d dockware/shopware:${{ matrix.shopware }}
          sleep 30
          docker logs $CONTAINER_NAME || true

      - name: Upload into Docker
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker cp $(pwd)/. $CONTAINER_NAME:/var/www/html/custom/plugins/FibProductLabel
          docker exec $CONTAINER_NAME bash -c 'sudo chown www-data:www-data /var/www/html/custom/plugins -R'

      - name: Install Plugin Dependencies
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker exec $CONTAINER_NAME bash -c 'cd /var/www/html/custom/plugins/FibProductLabel && composer install --no-interaction --no-progress'

      - name: PHP-CS-Fixer (Coding Style)
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker exec $CONTAINER_NAME bash -c 'cd /var/www/html/custom/plugins/FibProductLabel && composer run csfixer:check'

      - name: PHPStan (Static Analysis)
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker exec $CONTAINER_NAME bash -c 'cd /var/www/html/custom/plugins/FibProductLabel && composer run phpstan'

      - name: Install and Activate Plugin
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker exec $CONTAINER_NAME bash -c 'php bin/console plugin:refresh'
          docker exec $CONTAINER_NAME bash -c 'php bin/console plugin:install FibProductLabel --activate'
          docker exec $CONTAINER_NAME bash -c 'php bin/console cache:clear'

      - name: PHPUnit (Tests)
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker exec $CONTAINER_NAME bash -c 'cd /var/www/html/custom/plugins/FibProductLabel && composer run phpunit'

      - name: Install shopware-cli
        uses: shopware/shopware-cli-action@v3

      - name: Validate Extension
        run: shopware-cli extension validate .

      - name: Stop Docker
        if: always()
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          if [ "$(docker ps -q -f name=$CONTAINER_NAME)" ]; then
            docker stop $CONTAINER_NAME
          fi

  release:
    name: Create Release
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Clone Code
        uses: actions/checkout@v6

      - name: Install shopware-cli
        uses: shopware/shopware-cli-action@v3

      - name: Build and Zip extension
        run: |
          # The zip command will use the version from composer.json or create one
          shopware-cli extension zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FibProductLabel
          path: "*.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
