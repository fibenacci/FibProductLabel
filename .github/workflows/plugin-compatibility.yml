name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: PHP Quality | SW ${{ matrix.shopware }}, PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shopware: '6.7.2.2'
            php: '8.3'
          - shopware: '6.6.1.0'
            php: '8.2'
    steps:
      - name: Clone Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Docker
        run: docker pull dockware/shopware:${{ matrix.shopware }}

      - name: Start Docker
        run: |
          # Use unique container name to avoid conflicts in parallel runs
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker run --rm --name $CONTAINER_NAME --env PHP_VERSION=${{ matrix.php }} -d dockware/shopware:${{ matrix.shopware }}
          sleep 30
          docker logs $CONTAINER_NAME || true
          
      - name: Upload into Docker
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker cp $(pwd)/. $CONTAINER_NAME:/var/www/html/custom/plugins/FibProductLabel
          docker exec $CONTAINER_NAME bash -c 'sudo chown www-data:www-data /var/www/html/custom/plugins -R'

      - name: Install Plugin Dependencies
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker exec $CONTAINER_NAME bash -c 'cd /var/www/html/custom/plugins/FibProductLabel && composer install --no-interaction --no-progress'

      - name: PHP-CS-Fixer (Coding Style)
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker exec $CONTAINER_NAME bash -c 'cd /var/www/html/custom/plugins/FibProductLabel && vendor/bin/php-cs-fixer check --config=.php-cs-fixer.dist.php --diff --allow-risky=yes --using-cache=no'

      - name: PHPStan (Static Analysis)
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          # Run PHPStan from shop root to avoid relative path issues in core neon files
          docker exec $CONTAINER_NAME bash -c 'vendor/bin/phpstan analyse -c custom/plugins/FibProductLabel/phpstan.neon.dist custom/plugins/FibProductLabel/src'

      - name: Install and Activate Plugin
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker exec $CONTAINER_NAME bash -c 'php bin/console plugin:refresh'
          docker exec $CONTAINER_NAME bash -c 'php bin/console plugin:install FibProductLabel --activate'
          docker exec $CONTAINER_NAME bash -c 'php bin/console cache:clear'

      - name: PHPUnit (Tests)
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          docker exec $CONTAINER_NAME bash -c 'cd /var/www/html/custom/plugins/FibProductLabel && vendor/bin/phpunit -c phpunit.xml'

      - name: Stop Docker
        if: always()
        run: |
          CONTAINER_NAME="shop-${{ strategy.job-index }}"
          if [ "$(docker ps -q -f name=$CONTAINER_NAME)" ]; then
            docker stop $CONTAINER_NAME
          fi
